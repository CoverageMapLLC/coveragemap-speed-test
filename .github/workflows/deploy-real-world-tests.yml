name: Deploy Real-World Validation

on:
  push:
    branches:
      - development
      - main
  workflow_dispatch:

concurrency:
  group: deploy-real-world-${{ github.ref }}
  cancel-in-progress: true

jobs:
  real-world-speed-validation:
    name: Real-World Speed Validation
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: ${{ github.ref_name == 'main' && 'production' || 'development' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run deploy-time real-world speed tests
        run: npm run test:deploy
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          COVERAGEMAP_SPEED_API_BASE_URL: ${{ vars.COVERAGEMAP_SPEED_API_BASE_URL }}
          COVERAGEMAP_API_BASE_URL: ${{ vars.COVERAGEMAP_API_BASE_URL }}

      - name: Upload deploy validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: real-world-speed-results-${{ github.ref_name }}
          path: deploy-artifacts/*.json
          if-no-files-found: warn
